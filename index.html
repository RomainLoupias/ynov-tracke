<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YNOV Toulouse — Suivi Activite</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#ffffff;--surface:#f8f9fa;--surface2:#f0f2f5;--border:#e0e4ea;--accent:#1a73e8;--adm:#0d9488;--biz:#d97706;--text:#1a1a2e;--muted:#6b7280;--done:#16a34a;--partial:#d97706;--missed:#dc2626;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
header{padding:1.5rem 2.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100;}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:0.08em;}
.logo-sub{font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:0.15rem;}
.week-display{font-size:0.72rem;color:var(--muted);text-align:right;}
.week-display strong{color:var(--accent);display:block;font-size:0.85rem;}
.sync-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:0.45rem 2.5rem;display:flex;align-items:center;gap:0.75rem;font-size:0.68rem;color:var(--muted);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.3s;}
.sync-dot.ok{background:var(--done);}
.sync-dot.err{background:var(--missed);}
.sync-dot.loading{background:var(--partial);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.team-switcher{display:flex;padding:0 2.5rem;border-bottom:1px solid var(--border);}
.team-tab{padding:0.7rem 2rem;font-family:'Syne',sans-serif;font-weight:600;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;border:none;background:transparent;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;}
.team-tab.adm.active{color:var(--adm);border-bottom-color:var(--adm);}
.team-tab.biz.active{color:var(--biz);border-bottom-color:var(--biz);}
.team-tab:hover:not(.active){color:var(--text);}
.container{padding:2rem 2.5rem;max-width:1500px;}
.top-actions{display:flex;gap:0.75rem;margin-bottom:2rem;align-items:center;justify-content:space-between;flex-wrap:wrap;}
.top-left{display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;}
.week-nav{display:flex;align-items:center;gap:0.3rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.5rem;}
.week-nav button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.9rem;padding:0 0.3rem;}
.week-nav button:hover{color:var(--accent);}
.week-nav span{font-size:0.7rem;color:var(--text);padding:0 0.4rem;min-width:90px;text-align:center;}
.add-person-row{display:flex;gap:0.5rem;}
.add-person-row input{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.78rem;padding:0.45rem 0.8rem;outline:none;width:200px;}
.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:0.72rem;padding:0.45rem 0.9rem;border-radius:6px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);color:#ffffff;border-color:var(--accent);font-weight:500;}
.btn.primary:hover{opacity:0.85;}
.btn.sm{font-size:0.65rem;padding:0.3rem 0.6rem;}
.btn.danger:hover{border-color:var(--missed);color:var(--missed);}
.persons-grid{display:flex;flex-direction:column;gap:0;}
.person-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.person-card.adm{border-top:3px solid var(--adm);}
.person-card.biz{border-top:3px solid var(--biz);}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface2);}
.card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;}
.card-btns{display:flex;gap:0.4rem;align-items:center;}
.filiere-bar{display:flex;align-items:center;padding:0 1.25rem;background:var(--surface2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;min-height:36px;}
.filiere-bar::-webkit-scrollbar{display:none;}
.ftab{padding:0.45rem 0.8rem;font-size:0.62rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;border:none;background:transparent;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;}
.ftab.active-adm{color:var(--adm);border-bottom-color:var(--adm);}
.ftab.active-biz{color:var(--biz);border-bottom-color:var(--biz);}
.fadd{display:flex;align-items:center;gap:0.3rem;margin-left:0.5rem;flex-shrink:0;}
.fadd input{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.62rem;padding:0.2rem 0.5rem;outline:none;width:100px;}
.kpi-band{display:grid;border-bottom:1px solid var(--border);}
.kpi-cell{padding:0.65rem 0.5rem;text-align:center;border-right:1px solid var(--border);background:var(--bg);}
.kpi-cell:last-child{border-right:none;}
.kpi-label{font-size:0.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;line-height:1.3;margin-bottom:0.2rem;}
.kpi-value{font-family:'DM Serif Display',serif;font-size:1.4rem;line-height:1;}
.kpi-value.adm{color:var(--adm);}
.kpi-value.biz{color:var(--biz);}
.no-filiere{padding:0.6rem 1.25rem;font-size:0.7rem;color:var(--muted);font-style:italic;border-bottom:1px solid var(--border);}
.card-section{padding:0.9rem 1.25rem;border-bottom:1px solid var(--border);}
.card-section:last-child{border-bottom:none;}
.section-title{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:0.6rem;display:flex;justify-content:space-between;align-items:center;}
.taction{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:0.6rem 0.8rem;margin-bottom:0.5rem;}
.taction:last-child{margin-bottom:0;}
.ta-lbl{font-size:0.56rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.3rem;}
.ta-content{font-size:0.74rem;line-height:1.5;white-space:pre-wrap;color:var(--text);}
.ta-empty{font-size:0.7rem;color:var(--muted);font-style:italic;}
.pipe-item{display:flex;align-items:flex-start;gap:0.5rem;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.74rem;}
.pipe-item:last-child{border-bottom:none;}
.pi-main{flex:1;}
.pi-badge{font-size:0.6rem;padding:0.15rem 0.5rem;border-radius:4px;cursor:pointer;border:none;font-family:'DM Mono',monospace;text-transform:uppercase;flex-shrink:0;}
.ps-prospect{background:rgba(107,114,128,0.15);color:var(--muted);}
.ps-contact{background:rgba(217,119,6,0.15);color:var(--biz);}
.ps-rdv{background:rgba(13,148,136,0.15);color:var(--adm);}
.ps-negocia{background:rgba(245,158,11,0.15);color:var(--partial);}
.ps-signe{background:rgba(22,163,74,0.15);color:var(--done);}
.ps-perdu{background:rgba(220,38,38,0.15);color:var(--missed);}
.pi-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.68rem;flex-shrink:0;}
.pi-btn:hover{color:var(--missed);}
.strat{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.74rem;padding:0.5rem 0.7rem;outline:none;resize:vertical;min-height:58px;}
.strat:focus{border-color:var(--biz);}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);font-size:0.8rem;display:none;}
.empty-state.show{display:block;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:14px;width:min(480px,93vw);padding:1.75rem;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.modal h3{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:1.2rem;color:var(--text);}
.modal label{display:block;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:0.3rem;margin-top:0.8rem;}
.modal input,.modal textarea,.modal select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.78rem;padding:0.5rem 0.75rem;outline:none;}
.modal textarea{resize:vertical;min-height:80px;}
.modal select option{background:var(--surface);}
.mfooter{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;}
.modal-sep{font-size:0.6rem;color:var(--biz);text-transform:uppercase;letter-spacing:0.12em;margin-top:1rem;padding-top:0.8rem;border-top:1px solid var(--border);}
.rpanel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);z-index:300;overflow-y:auto;}
.rpanel.open{display:block;}
.rinner{max-width:900px;margin:3rem auto 4rem;background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:3rem;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.rclose{float:right;cursor:pointer;font-size:0.72rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:0.35rem 0.8rem;border-radius:6px;font-family:'DM Mono',monospace;}
.rtitle{font-family:'DM Serif Display',serif;font-size:2.2rem;margin-bottom:0.4rem;clear:both;color:var(--text);}
.rmeta{font-size:0.7rem;color:var(--muted);margin-bottom:2.5rem;}
.rteam{font-family:'Syne',sans-serif;font-weight:800;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:0.4rem;margin:2rem 0 1rem;}
.rperson{margin-bottom:2rem;padding:1.25rem;background:var(--surface);border-radius:10px;}
.rperson.adm{border-left:3px solid var(--adm);}
.rperson.biz{border-left:3px solid var(--biz);}
.rpname{font-family:'Syne',sans-serif;font-weight:700;font-size:0.92rem;margin-bottom:0.8rem;}
.rfiliere{font-family:'Syne',sans-serif;font-weight:600;font-size:0.75rem;margin:0.8rem 0 0.35rem;padding-top:0.6rem;border-top:1px solid var(--border);}
.rfiliere.adm{color:var(--adm);}
.rfiliere.biz{color:var(--biz);}
.rfiliere:first-of-type{border-top:none;margin-top:0;}
.rkpis{display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:0.5rem;font-size:0.71rem;}
.rkpi{color:var(--muted);}
.rkpi strong{color:var(--text);}
.rslbl{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:0.3rem;margin-top:0.65rem;}
.rtext{font-size:0.73rem;line-height:1.55;white-space:pre-wrap;color:var(--text);}
.rpipe{font-size:0.72rem;padding:0.18rem 0;}
.badge{font-size:0.58rem;padding:0.1rem 0.4rem;border-radius:3px;margin-left:0.3rem;display:inline-block;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:500;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.6rem 1rem;font-size:0.7rem;color:var(--muted);display:none;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
.toast.show{display:block;}
.toast.ok{color:var(--done);border-color:var(--done);}
.toast.err{color:var(--missed);border-color:var(--missed);}
.card-chart{padding:0.9rem 1.25rem 1rem;border-top:1px solid var(--border);}
.card-chart canvas{max-height:140px;width:100%!important;}
.chart-title{font-size:0.56rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.5rem;}

@media print{
  body,.rpanel{background:white;color:black;}
  header,.sync-bar,.team-switcher,.container,.stats-wrap{display:none;}
  .rpanel{display:block;position:static;}
  .rinner{border:none;margin:0;padding:1rem;background:white;}
  .rclose,.btn{display:none;}
}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo-name">YNOV TOULOUSE</div>
    <div class="logo-sub">Suivi Activite Equipes · Direction Campus</div>
  </div>
  <div class="week-display">
    <strong id="wRange">—</strong>
    <span id="wKey">—</span>
  </div>
</header>
<div class="sync-bar">
  <div class="sync-dot" id="sDot"></div>
  <span id="sLabel">Connexion...</span>
  <span style="margin-left:auto"></span>
  <button class="btn sm" onclick="forceSave()">💾 Sauvegarder</button>
  <button class="btn sm" onclick="forceLoad()" style="margin-left:0.4rem">🔄 Actualiser</button>
</div>
<div class="team-switcher">
  <button class="team-tab adm active" onclick="switchTeam('adm',this)">🎓 Admissions</button>
  <button class="team-tab biz" onclick="switchTeam('biz',this)">🤝 CRE — Relations Entreprises</button>
</div>
<div class="container" id="mainContainer">
  <div class="top-actions">
    <div class="top-left">
      <div class="week-nav">
        <button onclick="changeWeek(-1)">◀</button>
        <span id="wNavLabel">—</span>
        <button onclick="changeWeek(1)">▶</button>
      </div>
      <div class="add-person-row">
        <input type="text" id="newName" placeholder="Prenom Nom du membre..."/>
        <button class="btn primary" onclick="addPerson()">+ Ajouter membre</button>
      </div>
    </div>
    <button class="btn" onclick="openReport()">📄 Rapport direction</button>
  </div>
  <div class="persons-grid" id="grid"></div>
  <div class="empty-state" id="empty">
    <div style="font-size:2rem;opacity:0.3;margin-bottom:0.5rem">◎</div>
    Aucun membre. Ajoutez un membre ci-dessus.
  </div>
</div>

<!-- MODAL KPI ADM -->
<div class="overlay" id="mKpiAdm">
  <div class="modal">
    <h3>KPIs Admissions — <span id="mKpiAdmTitle"></span></h3>
    <label>Appels passes</label><input type="number" id="ka_calls" min="0" placeholder="0"/>
    <label>Dossiers de candidature</label><input type="number" id="ka_dossiers" min="0" placeholder="0"/>
    <label>RDV effectues (semaine passee)</label><input type="number" id="ka_rdv_done" min="0" placeholder="0"/>
    <label>No-shows (semaine passee)</label><input type="number" id="ka_noshow" min="0" placeholder="0"/>
    <label>RDV planifies (cette semaine)</label><input type="number" id="ka_rdv_planned" min="0" placeholder="0"/>
    <div class="mfooter">
      <button class="btn" onclick="closeOverlay('mKpiAdm')">Annuler</button>
      <button class="btn primary" onclick="saveKpiAdm()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL KPI CRE -->
<div class="overlay" id="mKpiCre">
  <div class="modal">
    <h3>KPIs CRE — <span id="mKpiCreTitle"></span></h3>
    <div class="modal-sep" style="margin-top:0;padding-top:0;border-top:none;color:var(--muted)">KPIs de la filiere active</div>
    <label>Offres actives sur Ymatch</label><input type="number" id="kc_offres_actives" min="0" placeholder="0"/>
    <label>Candidats actifs (matchables)</label><input type="number" id="kc_candidats_actifs" min="0" placeholder="0"/>
    <div class="modal-sep">KPIs specifiques — <span id="mKpiCreFiliere" style="color:var(--biz)"></span></div>
    <label>Offres publiees cette semaine (Ymatch)</label><input type="number" id="kc_offres_ymatch" min="0" placeholder="0"/>
    <label>Offres poussees aux etudiants</label><input type="number" id="kc_offres_pushed" min="0" placeholder="0"/>
    <label>CV approuves</label><input type="number" id="kc_cv_approved" min="0" placeholder="0"/>
    <label>BIP realises</label><input type="number" id="kc_bip" min="0" placeholder="0"/>
    <label>Alternances signees</label><input type="number" id="kc_alternances" min="0" placeholder="0"/>
    <div class="mfooter">
      <button class="btn" onclick="closeOverlay('mKpiCre')">Annuler</button>
      <button class="btn primary" onclick="saveKpiCre()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL TEXT -->
<div class="overlay" id="mText">
  <div class="modal">
    <h3 id="mTextTitle">—</h3>
    <label id="mTextLabel">—</label>
    <textarea id="mTextContent" rows="6"></textarea>
    <div class="mfooter">
      <button class="btn" onclick="closeOverlay('mText')">Annuler</button>
      <button class="btn primary" onclick="saveTextAction()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL PIPELINE -->
<div class="overlay" id="mPipe">
  <div class="modal">
    <h3>Entreprise — <span id="mPipeName"></span></h3>
    <label>Nom de l entreprise</label><input type="text" id="mp_company" placeholder="Ex : Airbus, Capgemini..."/>
    <label>Secteur / Domaine</label><input type="text" id="mp_sector" placeholder="Ex : Tech, Aero, Marketing..."/>
    <label>Statut</label>
    <select id="mp_status">
      <option value="prospect">Prospect</option>
      <option value="contact">Premier contact</option>
      <option value="rdv">RDV planifie / realise</option>
      <option value="negocia">En negociation</option>
      <option value="signe">Convention signee</option>
      <option value="perdu">Perdu / Sans suite</option>
    </select>
    <label>Levier / Partenaire</label><input type="text" id="mp_lever" placeholder="Ex : LinkedIn, reseau..."/>
    <label>Etudiant(s) place(s)</label><input type="text" id="mp_students" placeholder="Ex : Thomas D., Lea M."/>
    <label>Notes / Prochaine action</label><textarea id="mp_notes" rows="3" placeholder="Ex : RDV le 28 mai..."></textarea>
    <div class="mfooter">
      <button class="btn" onclick="closeOverlay('mPipe')">Annuler</button>
      <button class="btn primary" onclick="savePipe()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- REPORT -->
<div class="rpanel" id="rPanel">
  <div class="rinner">
    <button class="rclose" onclick="closeReport()">Fermer</button>
    <div class="rtitle">Rapport d Activite</div>
    <div class="rmeta" id="rMeta"></div>
    <div id="rContent"></div>
    <div style="text-align:right;margin-top:2rem">
      <button class="btn" onclick="window.print()">Imprimer / PDF</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var AURL = 'https://ynov-tracker-default-rtdb.europe-west1.firebasedatabase.app';
var S = { team: 'adm', wOff: 0, persons: {} };
var saveTimer = null;
var _eid = null, _efi = null, _epi = null, _etk = null;
var chartInstances = {};

function ss(st, msg) {
  document.getElementById('sDot').className = 'sync-dot ' + st;
  document.getElementById('sLabel').textContent = msg;
}
function toast(msg, t) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + t;
  setTimeout(function() { el.className = 'toast'; }, 2800);
}
function getWK() { return getWKey(S.wOff); }

function getWeekData(p) {
  var wk = getWK();
  if (!p.weeks) p.weeks = {};
  if (!p.weeks[wk]) p.weeks[wk] = {};
  var w = p.weeks[wk];
  if (!w.aa) w.aa = { bilan:'', plan:'', anImg:'', anName:'' };
  if (!w.cd) w.cd = { strat:'', lev:'', autre:'', nego:'' };
  if (!w.pipe) w.pipe = [];
  return w;
}

function getFWD(p, fil) {
  var wk = getWK();
  if (!p.fData) p.fData = {};
  if (!p.fData[fil]) p.fData[fil] = {};
  if (!p.fData[fil][wk]) p.fData[fil][wk] = { k:{} };
  if (!p.fData[fil][wk].k) p.fData[fil][wk].k = {};
  return p.fData[fil][wk];
}

function schema() {
  Object.values(S.persons).forEach(function(p) {
    if (!p.fil) p.fil = [];
    if (!p.aFil) p.aFil = null;
    if (!p.fData) p.fData = {};
    if (!p.weeks) p.weeks = {};
    p.fil.forEach(function(f) { if (!p.fData[f]) p.fData[f] = {}; });
  });
}

async function loadFromCloud() {
  ss('loading', 'Chargement...');
  try {
    var res = await fetch(AURL + '/persons.json');
    if (!res.ok) throw new Error(res.status);
    var data = await res.json();
    S.persons = {};
    if (data) { Object.keys(data).forEach(function(id) { S.persons[id] = data[id]; }); }
    schema();
    ss('ok', 'Synchronise ' + new Date().toLocaleTimeString('fr-FR'));
  } catch(e) {
    ss('err', 'Erreur reseau - donnees locales');
    try { var r = localStorage.getItem('yn_bk'); if (r) { S.persons = JSON.parse(r); schema(); } } catch(_) {}
  }
  render();
}

async function saveToCloud() {
  ss('loading', 'Sauvegarde...');
  try { localStorage.setItem('yn_bk', JSON.stringify(S.persons)); } catch(_) {}

function getMon(o) {
  var d = new Date(); var day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1 + o * 7); d.setHours(0,0,0,0); return d;
}
function getWKey(o) {
  var m = getMon(o); var y = m.getFullYear();
  var j = new Date(y,0,1);
  var w = Math.ceil(((m-j)/86400000 + j.getDay() + 1) / 7);
  return y + '-W' + String(w).padStart(2,'0');
}
function getWLbl(o) {
  var m = getMon(o); var f = new Date(m); f.setDate(f.getDate()+4);
  var fmt = function(d) { return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}); };
  return fmt(m) + ' - ' + fmt(f);
}

var CHART_COLORS = ['#0d9488','#d97706','#7c3aed','#db2777','#16a34a','#2563eb','#ea580c','#ca8a04'];
var ADM_KPIS = [['calls','Appels'],['rdv_done','RDV effectues'],['noshow','No-shows'],['rdv_planned','RDV planifies'],['dossiers','Dossiers']];

function getLastWeeks(n) {
  var wks = [];
  for (var i = n-1; i >= 0; i--) wks.push(getWKey(S.wOff - i));
  return wks;
}
function wLabel(wk) { return 'S' + wk.split('-W')[1]; }

function getFKpi(p, fil, wk, key) {
  if (!p.fData || !p.fData[fil] || !p.fData[fil][wk] || !p.fData[fil][wk].k) return 0;
  return p.fData[fil][wk].k[key] || 0;
}

function destroyCharts() {
  Object.keys(chartInstances).forEach(function(k) { try { chartInstances[k].destroy(); } catch(ex) {} });
  chartInstances = {};
}

function drawInlineChart(canvasId, labels, datasets) {
  if (chartInstances[canvasId]) { try { chartInstances[canvasId].destroy(); } catch(ex) {} }
  var ctx = document.getElementById(canvasId);
  if (!ctx) return;
  chartInstances[canvasId] = new Chart(ctx.getContext('2d'), {
    type: 'line',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#1a1a2e', font: { size: 9, family: 'DM Mono' } } } },
      scales: {
        x: { ticks: { color: '#6b7280', font: { size: 9 } }, grid: { color: '#e0e4ea' } },
        y: { ticks: { color: '#6b7280', font: { size: 9 } }, grid: { color: '#e0e4ea' }, beginAtZero: true }
      }
    }
  });
}

function mkInlineChart(p, kpiList, color) {
  var cid = 'inlinechart_' + p.id;
  var weeks = getLastWeeks(8);
  var wlbls = weeks.map(wLabel);
  var ds = kpiList.map(function(kpi, ki) {
    return {
      label: kpi[1],
      data: weeks.map(function(wk) {
        var t = 0;
        p.fil.forEach(function(f) { t += getFKpi(p, f, wk, kpi[0]); });
        return t;
      }),
      borderColor: CHART_COLORS[ki % CHART_COLORS.length],
      backgroundColor: CHART_COLORS[ki % CHART_COLORS.length] + '15',
      tension: 0.3, fill: false, pointRadius: 3, borderWidth: 2
    };
  });
  setTimeout(function() { drawInlineChart(cid, wlbls, ds); }, 50);
  return "<div class=\"card-chart\"><div class=\"chart-title\">Evolution sur 8 semaines</div><canvas id=\"" + cid + "\"></canvas></div>";
}

      });
      if (aa.bilan) html += '<div class="rslbl">📋 Bilan S-1</div><div class="rtext">' + e(aa.bilan) + (aa.anImg?' <span style="color:var(--adm)">[Screenshot SF joint]</span>':'') + '</div>';
      if (aa.plan) html += '<div class="rslbl">🎯 Plan d actions S+1</div><div class="rtext">' + e(aa.plan) + '</div>';
      html += '</div>';
    });
  }
  var cres = Object.values(S.persons).filter(function(p) { return p.team === 'biz'; });
  if (cres.length) {
    html += '<div class="rteam">Charges de Relations Entreprises</div>';
    cres.forEach(function(p) {
      var wd = getWeekData(p); var cd = wd.cd||{}; var pl = wd.pipe||[];
      var signed = pl.filter(function(i){return i.status==='signe';}).length;
      var active = pl.filter(function(i){return ['contact','rdv','negocia'].indexOf(i.status)>=0;}).length;
      html += '<div class="rperson biz"><div class="rpname">' + e(p.name) + '</div>';
      p.fil.forEach(function(f) {
        var kf = getFWD(p, f).k;
        html += '<div class="rfiliere biz">📚 ' + e(f) + '</div><div class="rkpis">' +
          '<span class="rkpi"><strong>' + (kf.offres_actives!=null?kf.offres_actives:'—') + '</strong> offres actives</span>' +
          '<span class="rkpi"><strong>' + (kf.candidats_actifs!=null?kf.candidats_actifs:'—') + '</strong> candidats actifs</span>' +
          '<span class="rkpi"><strong>' + (kf.offres_ymatch!=null?kf.offres_ymatch:'—') + '</strong> offres Ymatch</span>' +
          '<span class="rkpi"><strong>' + (kf.offres_pushed!=null?kf.offres_pushed:'—') + '</strong> poussees</span>' +
          '<span class="rkpi"><strong>' + (kf.cv_approved!=null?kf.cv_approved:'—') + '</strong> CV approuves</span>' +
          '<span class="rkpi"><strong>' + (kf.bip!=null?kf.bip:'—') + '</strong> BIP</span>' +
          '<span class="rkpi"><strong>' + (kf.alternances!=null?kf.alternances:'—') + '</strong> alternances</span></div>';
      });
      if (pl.length) {
        html += '<div class="rslbl">Pipeline (' + pl.length + ' entreprises - ' + signed + ' signees - ' + active + ' en cours)</div>';
        pl.forEach(function(item) {
          html += '<div class="rpipe"><strong>' + e(item.company) + '</strong>' +
            (item.sector?' - <span style="opacity:0.6">'+e(item.sector)+'</span>':'') +
            '<span class="badge ' + PSC[item.status] + '">' + PSL[item.status] + '</span>' +
            (item.lever?' <span style="font-size:0.62rem;opacity:0.6">⚡'+e(item.lever)+'</span>':'') +
            (item.students?' <span style="font-size:0.62rem;color:var(--done)">🎓'+e(item.students)+'</span>':'') +
            (item.notes?'<div style="font-size:0.65rem;opacity:0.6;margin-left:0.5rem">'+e(item.notes)+'</div>':'') + '</div>';
        });
      }
      if (cd.nego) html += '<div class="rslbl">Negociations</div><div class="rtext">' + e(cd.nego) + '</div>';
      if (cd.strat) html += '<div class="rslbl">Strategie BD</div><div class="rtext">' + e(cd.strat) + '</div>';
      if (cd.lev) html += '<div class="rslbl">Leviers</div><div class="rtext">' + e(cd.lev) + '</div>';
      if (cd.autre) html += '<div class="rslbl">Autre</div><div class="rtext">' + e(cd.autre) + '</div>';
      html += '</div>';
    });
  }
  document.getElementById('rContent').innerHTML = html || '<p style="color:var(--muted)">Aucune donnee saisie.</p>';
  document.getElementById('rPanel').classList.add('open');
}
function closeReport() { document.getElementById('rPanel').classList.remove('open'); }

function openOv(id) { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(function(el) {
  el.addEventListener('click', function(ev) { if (ev.target === el) el.classList.remove('open'); });
});

function switchTeam(team, el) {
  S.team = team;
  document.querySelectorAll('.team-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  destroyCharts();
  render();
}

document.addEventListener('click', function(ev) {
  var t = ev.target;
  var action = t.getAttribute('data-action');
  if (!action) return;
  var pid = t.getAttribute('data-pid');
  var f = t.getAttribute('data-f');
  var fil = t.getAttribute('data-fil');
  var key = t.getAttribute('data-key');
  var idx = t.getAttribute('data-idx');
  ev.stopPropagation();
  if (action === 'swf') { switchFil(pid, f); }
  else if (action === 'delf') { delFil(pid, f); }
  else if (action === 'addf') { addFil(pid); }
  else if (action === 'delperson') { delPerson(pid); }
  else if (action === 'kpiadm') { openKpiAdm(pid, fil); }
  else if (action === 'kpicre') { openKpiCre(pid, fil); }
  else if (action === 'ta') { openTA(pid, key); }
  else if (action === 'trigup') { trigUp(pid); }
  else if (action === 'addpipe') { openPipe(pid, null); }
  else if (action === 'editpipe') { openPipe(pid, parseInt(idx)); }
  else if (action === 'delpipe') { delPipe(pid, parseInt(idx)); }
  else if (action === 'cyclepipe') { cyclePipe(pid, parseInt(idx)); }
});
document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Enter') {
    var t = ev.target;
    if (t.getAttribute('data-action') === 'addf') { addFil(t.getAttribute('data-pid')); }
  }
});
document.addEventListener('input', function(ev) {
  var t = ev.target;
  var action = t.getAttribute('data-action');
  var pid = t.getAttribute('data-pid');
  if (action === 'cdtext') { saveCd(pid, t.getAttribute('data-key'), t.value); }
  else if (action === 'imgup') { handleImg(pid, t); }
});
document.addEventListener('change', function(ev) {
  var t = ev.target;
  if (t.getAttribute('data-action') === 'imgup') { handleImg(t.getAttribute('data-pid'), t); }
});

updateWUI();
loadFromCloud();
</script>
</body>
</html>
